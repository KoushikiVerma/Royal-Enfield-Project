<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/form.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<a href="javascript:history.back()" class="back-btn">← Back</a>

<div class="form-page">

    <!-- LEFT SIDE -->
    <div class="form-left">

        <h1>Let's Get in Touch</h1>

        <p>
            Ready to experience the thump? Visit us or drop a message for a test ride.
        </p>

        <div class="contact-info">
            <p><strong>📞 Phone:</strong> +91 9999911111</p>
            <p><strong>📍 Address:</strong> Royal Enfield Showroom</p>
            <p><strong>✉ Email:</strong> contact@royalenfield.com</p>
        </div>

    </div>

    <!-- RIGHT SIDE FORM -->
    <div class="form-right">

        <form method="POST">

            <input type="text" name="name" placeholder="Full Name" required>

            <input type="email" name="email" placeholder="Email Address" required>

            <textarea name="message" placeholder="Your Message" required></textarea>

            <button type="submit">Send Message</button>

        </form>

    </div>

</div>

</body>
</html>
