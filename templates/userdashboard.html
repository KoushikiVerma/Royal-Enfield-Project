<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        /* NAVBAR */
        .dash-nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            background: #000;
            color: #fff;
        }

        .dash-nav a {
            color: #fff;
            text-decoration: none;
        }

        /* MAIN */
        .dashboard {
            padding: 50px 20px;
            text-align: center;
        }

        .dashboard h2 {
            margin-bottom: 40px;
            font-size: 32px;
        }

        /* GRID */
        .dash-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            max-width: 1000px;
            margin: auto;
        }

        /* CARD */
        .dash-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .dash-card {
            padding: 40px 20px;
            border-radius: 20px;
            color: white;
            text-align: center;
            cursor: pointer;
            transition: 0.4s;
        }

        /* COLORS */
        .bikes { background: linear-gradient(135deg, #1c1c1c, #3b2a1f); }
        .services { background: linear-gradient(135deg, #2b1d14, #5a3e2b); }
        .emi { background: linear-gradient(135deg, #111, #444); }
        .profile { background: linear-gradient(135deg, #3b2a1f, #7a5a42); }

        /* HOVER */
        .dash-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .dash-card h3 {
            font-size: 22px;
        }

        .dash-card p {
            font-size: 14px;
            margin-top: 10px;
            opacity: 0.8;
        }

        .card-link {
            text-decoration: none;
            color: inherit;
        }

        /* POPUP */
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: #2b1d14;
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s;
            z-index: 1000;
        }

        .popup button {
            margin-top: 15px;
            padding: 8px 20px;
            border: none;
            background: #5a3e2b;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .popup.show {
            transform: translate(-50%, -50%) scale(1);
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="dash-nav">
    <h3>Welcome {{ session['user_name'] }} !!</h3>
    <a href="/logout">Logout</a>
</div>

<!-- DASHBOARD -->
<div class="dashboard">

    <h2>User Dashboard</h2>

    <div class="dash-grid">

        <!-- BIKES -->
        <a href="/bikes" class="card-link">
            <div class="dash-card bikes">
                <img src="{{ url_for('static', filename='images/bike.png') }}">
                <h3>Bikes</h3>
                <p>Explore available bikes</p>
            </div>
        </a>

        <!-- SERVICES -->
        <a href="/services" class="card-link">
            <div class="dash-card services">
                <img src="{{ url_for('static', filename='images/service.png') }}">
                <h3>Services</h3>
                <p>Check service options</p>
            </div>
        </a>

        <!-- EMI (POPUP ONLY) -->
        <div onclick="showEmiMessage()">
            <div class="dash-card emi">
                <img src="{{ url_for('static', filename='images/emi.png') }}">
                <h3>View EMI Plans</h3>
                <p>Select bike to view EMI</p>
            </div>
        </div>

        <!-- PROFILE -->
        <a href="/profile" class="card-link">
            <div class="dash-card profile">
                <img src="{{ url_for('static', filename='images/profile.png') }}">
                <h3>Profile</h3>
                <p>Manage your account</p>
            </div>
        </a>

    </div>

</div>

<!-- POPUP -->
<div id="emiPopup" class="popup">
    <p>Select bike to view EMI plans</p>
    <button onclick="closePopup()">OK</button>
</div>

<!-- JS -->
<script>
function showEmiMessage() {
    document.getElementById("emiPopup").classList.add("show");
}

function closePopup() {
    document.getElementById("emiPopup").classList.remove("show");
}
</script>

</body>
</html>
